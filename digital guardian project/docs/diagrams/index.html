<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Guardian Diagrams</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #17324d;
      --muted: #5d748a;
      --border: #c8d7e6;
      --accent: #2f5d8a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #eef5fb 0%, #f9fbfd 100%);
      color: var(--text);
    }

    .wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 34px;
    }

    p {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 24px;
      box-shadow: 0 10px 28px rgba(34, 67, 107, 0.08);
    }

    h2 {
      margin: 0 0 12px;
      font-size: 22px;
    }

    .actions {
      margin-bottom: 14px;
    }

    .actions a {
      display: inline-block;
      margin-right: 12px;
      padding: 10px 14px;
      border-radius: 10px;
      text-decoration: none;
      color: white;
      background: var(--accent);
      font-size: 14px;
    }

    img {
      width: 100%;
      height: auto;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: white;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Digital Guardian Diagrams</h1>
    <p>Open any diagram below directly from your local project folder.</p>

    <div class="card">
      <h2>Database Table Diagram</h2>
      <div class="actions">
        <a href="./database_tables.svg" target="_blank">Open Full Image</a>
      </div>
      <img src="./database_tables.svg" alt="Database table diagram" />
    </div>

    <div class="card">
      <h2>DFD Diagram</h2>
      <div class="actions">
        <a href="./dfd.svg" target="_blank">Open Full Image</a>
      </div>
      <img src="./dfd.svg" alt="DFD diagram" />
    </div>

    <div class="card">
      <h2>UML Class Diagram</h2>
      <div class="actions">
        <a href="./uml_class_diagram.svg" target="_blank">Open Full Image</a>
      </div>
      <img src="./uml_class_diagram.svg" alt="UML class diagram" />
    </div>
  </div>
</body>
</html>
