<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1520" viewBox="0 0 2200 1520">
  <defs>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #16324f; }
      .subtitle { font: 400 15px Arial, sans-serif; fill: #49627a; }
      .head { font: 700 18px Arial, sans-serif; fill: #ffffff; }
      .row { font: 13px Consolas, 'Courier New', monospace; fill: #16324f; }
      .small { font: 12px Arial, sans-serif; fill: #49627a; }
      .line { stroke: #6588a6; stroke-width: 2.2; fill: none; }
      .bg { fill: #f5f8fc; }
      .card { fill: #ffffff; stroke: #90aeca; stroke-width: 2; rx: 12; ry: 12; }
      .cardHead { fill: #2f5d8a; rx: 12; ry: 12; }
      .fk { fill: #bf5b04; }
      .pk { fill: #0a6c3f; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="2200" height="1520"/>
  <text x="56" y="56" class="title">Digital Guardian Database Tables</text>
  <text x="56" y="82" class="subtitle">Derived from <tspan font-weight="700">backend/app/models/__init__.py</tspan> and <tspan font-weight="700">database/schema.sql</tspan></text>

  <g transform="translate(40,120)">
    <rect class="card" x="0" y="0" width="320" height="164"/>
    <rect class="cardHead" x="0" y="0" width="320" height="34"/>
    <text class="head" x="14" y="23">parent_users</text>
    <text class="row" x="14" y="58"><tspan class="pk">PK</tspan> id : INT</text>
    <text class="row" x="14" y="80">parent_name : VARCHAR(120)</text>
    <text class="row" x="14" y="102">email : VARCHAR(160) UNIQUE</text>
    <text class="row" x="14" y="124">phone_number : VARCHAR(40)</text>
    <text class="row" x="14" y="146">password_hash, created_at</text>
  </g>

  <g transform="translate(420,120)">
    <rect class="card" x="0" y="0" width="300" height="142"/>
    <rect class="cardHead" x="0" y="0" width="300" height="34"/>
    <text class="head" x="14" y="23">admin_users</text>
    <text class="row" x="14" y="58"><tspan class="pk">PK</tspan> id : INT</text>
    <text class="row" x="14" y="80">username : VARCHAR(80) UNIQUE</text>
    <text class="row" x="14" y="102">password_hash : VARCHAR(255)</text>
    <text class="row" x="14" y="124">is_active, last_login_at, created_at</text>
  </g>

  <g transform="translate(40,340)">
    <rect class="card" x="0" y="0" width="360" height="252"/>
    <rect class="cardHead" x="0" y="0" width="360" height="34"/>
    <text class="head" x="14" y="23">child_profiles</text>
    <text class="row" x="14" y="58"><tspan class="pk">PK</tspan> id : INT</text>
    <text class="row" x="14" y="80"><tspan class="fk">FK</tspan> parent_id : INT</text>
    <text class="row" x="14" y="102">child_name : VARCHAR(120)</text>
    <text class="row" x="14" y="124">child_username : VARCHAR(80) UNIQUE</text>
    <text class="row" x="14" y="146">password_hash : VARCHAR(255)</text>
    <text class="row" x="14" y="168">age, gender, grade, school_name</text>
    <text class="row" x="14" y="190">parent_contact, device_name</text>
    <text class="row" x="14" y="212">screen_time_limit_hours, notes</text>
    <text class="row" x="14" y="234">is_active, created_at</text>
  </g>

  <g transform="translate(460,340)">
    <rect class="card" x="0" y="0" width="320" height="164"/>
    <rect class="cardHead" x="0" y="0" width="320" height="34"/>
    <text class="head" x="14" y="23">restricted_keywords</text>
    <text class="row" x="14" y="58"><tspan class="pk">PK</tspan> id : INT</text>
    <text class="row" x="14" y="80">keyword : VARCHAR(120) UNIQUE</text>
    <text class="row" x="14" y="102">category : VARCHAR(80)</text>
    <text class="row" x="14" y="124">severity : VARCHAR(20)</text>
    <text class="row" x="14" y="146">active, created_at</text>
  </g>

  <g transform="translate(860,120)">
    <rect class="card" x="0" y="0" width="370" height="208"/>
    <rect class="cardHead" x="0" y="0" width="370" height="34"/>
    <text class="head" x="14" y="23">browsing_history</text>
    <text class="row" x="14" y="58"><tspan class="pk">PK</tspan> id : INT</text>
    <text class="row" x="14" y="80"><tspan class="fk">FK</tspan> parent_id : INT</text>
    <text class="row" x="14" y="102"><tspan class="fk">FK</tspan> child_id : INT</text>
    <text class="row" x="14" y="124">search_query, site_url, device_name</text>
    <text class="row" x="14" y="146">activity_type : VARCHAR(40)</text>
    <text class="row" x="14" y="168">matched_keyword, matched_category</text>
    <text class="row" x="14" y="190">is_restricted, search_time, created_at</text>
  </g>

  <g transform="translate(860,390)">
    <rect class="card" x="0" y="0" width="380" height="186"/>
    <rect class="cardHead" x="0" y="0" width="380" height="34"/>
    <text class="head" x="14" y="23">safe_search_results</text>
    <text class="row" x="14" y="58"><tspan class="pk">PK</tspan> id : INT</text>
    <text class="row" x="14" y="80"><tspan class="fk">FK</tspan> parent_id : INT</text>
    <text class="row" x="14" y="102"><tspan class="fk">FK</tspan> child_id : INT</text>
    <text class="row" x="14" y="124"><tspan class="fk">FK</tspan> history_id : INT NULL</text>
    <text class="row" x="14" y="146">search_query, matched_keyword, search_topic</text>
    <text class="row" x="14" y="168">is_restricted, recommended_sites, blocked_reason</text>
  </g>

  <g transform="translate(860,640)">
    <rect class="card" x="0" y="0" width="370" height="186"/>
    <rect class="cardHead" x="0" y="0" width="370" height="34"/>
    <text class="head" x="14" y="23">activity_logs</text>
    <text class="row" x="14" y="58"><tspan class="pk">PK</tspan> id : INT</text>
    <text class="row" x="14" y="80"><tspan class="fk">FK</tspan> parent_id : INT</text>
    <text class="row" x="14" y="102"><tspan class="fk">FK</tspan> child_id : INT</text>
    <text class="row" x="14" y="124">event_type, app_name, target_name</text>
    <text class="row" x="14" y="146">target_url, keyword, matched_category</text>
    <text class="row" x="14" y="168">details, is_restricted, occurred_at, created_at</text>
  </g>

  <g transform="translate(1320,120)">
    <rect class="card" x="0" y="0" width="340" height="186"/>
    <rect class="cardHead" x="0" y="0" width="340" height="34"/>
    <text class="head" x="14" y="23">alerts</text>
    <text class="row" x="14" y="58"><tspan class="pk">PK</tspan> id : INT</text>
    <text class="row" x="14" y="80"><tspan class="fk">FK</tspan> parent_id : INT</text>
    <text class="row" x="14" y="102"><tspan class="fk">FK</tspan> child_id : INT</text>
    <text class="row" x="14" y="124"><tspan class="fk">FK</tspan> history_id, activity_id</text>
    <text class="row" x="14" y="146">title, description, severity</text>
    <text class="row" x="14" y="168">status, created_at</text>
  </g>

  <g transform="translate(1320,370)">
    <rect class="card" x="0" y="0" width="360" height="186"/>
    <rect class="cardHead" x="0" y="0" width="360" height="34"/>
    <text class="head" x="14" y="23">notifications</text>
    <text class="row" x="14" y="58"><tspan class="pk">PK</tspan> id : INT</text>
    <text class="row" x="14" y="80"><tspan class="fk">FK</tspan> parent_id : INT</text>
    <text class="row" x="14" y="102"><tspan class="fk">FK</tspan> child_id : INT NULL</text>
    <text class="row" x="14" y="124">channel, recipient, provider, trigger_type</text>
    <text class="row" x="14" y="146">title, message, delivery_status</text>
    <text class="row" x="14" y="168">meta_json, sent_at, created_at</text>
  </g>

  <g transform="translate(1320,620)">
    <rect class="card" x="0" y="0" width="330" height="164"/>
    <rect class="cardHead" x="0" y="0" width="330" height="34"/>
    <text class="head" x="14" y="23">reports</text>
    <text class="row" x="14" y="58"><tspan class="pk">PK</tspan> id : INT</text>
    <text class="row" x="14" y="80"><tspan class="fk">FK</tspan> parent_id : INT</text>
    <text class="row" x="14" y="102">report_type, week_label, month_label</text>
    <text class="row" x="14" y="124">screen_time_hours, restricted_attempts_count</text>
    <text class="row" x="14" y="146">safe_browsing_score, summary_json, created_at</text>
  </g>

  <g transform="translate(1720,120)">
    <rect class="card" x="0" y="0" width="330" height="164"/>
    <rect class="cardHead" x="0" y="0" width="330" height="34"/>
    <text class="head" x="14" y="23">settings</text>
    <text class="row" x="14" y="58"><tspan class="pk">PK</tspan> id : INT</text>
    <text class="row" x="14" y="80"><tspan class="fk">FK</tspan> parent_id : INT UNIQUE</text>
    <text class="row" x="14" y="102">dark_mode, help_email, security_mode</text>
    <text class="row" x="14" y="124">notification_enabled, emergency_alerts_enabled</text>
    <text class="row" x="14" y="146">weekly_report_day, created_at, updated_at</text>
  </g>

  <g transform="translate(1720,360)">
    <rect class="card" x="0" y="0" width="340" height="164"/>
    <rect class="cardHead" x="0" y="0" width="340" height="34"/>
    <text class="head" x="14" y="23">admin_panel_settings</text>
    <text class="row" x="14" y="58"><tspan class="pk">PK</tspan> id : INT</text>
    <text class="row" x="14" y="80">theme, security_mode, support_email</text>
    <text class="row" x="14" y="102">app_info, monitoring_enabled</text>
    <text class="row" x="14" y="124">created_at, updated_at</text>
  </g>

  <g transform="translate(1720,600)">
    <rect class="card" x="0" y="0" width="360" height="186"/>
    <rect class="cardHead" x="0" y="0" width="360" height="34"/>
    <text class="head" x="14" y="23">admin_audit_logs</text>
    <text class="row" x="14" y="58"><tspan class="pk">PK</tspan> id : INT</text>
    <text class="row" x="14" y="80"><tspan class="fk">FK</tspan> admin_id : INT NULL</text>
    <text class="row" x="14" y="102">action, entity_type, entity_name</text>
    <text class="row" x="14" y="124">details, request_path, ip_address</text>
    <text class="row" x="14" y="146">created_at</text>
  </g>

