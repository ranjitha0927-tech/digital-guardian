  <rect x="54" y="1430" width="560" height="58" rx="10" ry="10" fill="#ffffff" stroke="#90aeca" stroke-width="1.5"/>
  <text class="small" x="72" y="1456">Legend:</text>
  <text class="small" x="132" y="1456"><tspan class="pk">PK</tspan> Primary Key</text>
  <text class="small" x="280" y="1456"><tspan class="fk">FK</tspan> Foreign Key</text>
  <text class="small" x="398" y="1456">Relationships are simplified for readability.</text>
