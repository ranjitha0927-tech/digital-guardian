  <path class="line" d="M320 232 C980 232, 1100 464, 1320 464"/>
  <text class="small" x="1070" y="346">1 to many</text>

  <path class="line" d="M320 238 C990 238, 1140 702, 1320 702"/>
  <text class="small" x="1086" y="538">1 to many</text>

  <path class="line" d="M320 244 C1240 244, 1520 202, 1720 202"/>
