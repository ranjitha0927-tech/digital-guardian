<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diagram Viewer</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f4f7fb;
      font-family: Arial, sans-serif;
    }

    .frame {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      box-sizing: border-box;
      background: linear-gradient(180deg, #eef5fb 0%, #f7fbff 100%);
    }

    img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
      border-radius: 8px;
      background: white;
    }
  </style>
</head>
<body>
  <div class="frame">
    <img id="diagram" alt="Diagram" />
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const src = params.get("src");
    if (src) {
      document.getElementById("diagram").src = src;
    }
  </script>
</body>
</html>
