<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Structured Diagrams</title>
  <style>
    :root {
      --bg: #eef4fb;
      --card: #ffffff;
      --text: #17324d;
      --muted: #5e7488;
      --border: #d4dfeb;
      --accent: #2f5d8a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: linear-gradient(180deg, #edf4fb 0%, #f9fbfe 100%);
      font-family: Arial, sans-serif;
      color: var(--text);
    }

    .page {
      width: 1600px;
      min-height: 1000px;
      margin: 0 auto;
      padding: 36px;
    }

    .hero {
      margin-bottom: 24px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 34px;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 18px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 18px 40px rgba(45, 86, 132, 0.12);
      overflow: hidden;
    }

    .panel-head {
      padding: 20px 26px;
      background: linear-gradient(135deg, #2f5d8a 0%, #4678aa 100%);
      color: white;
    }

    .panel-head h2 {
      margin: 0 0 6px;
      font-size: 28px;
    }

    .panel-head p {
      margin: 0;
      font-size: 16px;
      color: rgba(255, 255, 255, 0.9);
    }

    .image-wrap {
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f9fbff;
    }

    .image-wrap img {
      max-width: 100%;
      max-height: 840px;
      object-fit: contain;
      display: block;
      background: white;
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="hero">
      <h1 id="main-title">Digital Guardian Diagram</h1>
      <p id="main-subtitle">Structured presentation image</p>
    </div>

    <div class="panel">
      <div class="panel-head">
        <h2 id="diagram-title">Diagram Title</h2>
        <p id="diagram-subtitle">Diagram description</p>
      </div>
      <div class="image-wrap">
        <img id="diagram-image" alt="Diagram" />
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const image = params.get("image") || "";
    const title = params.get("title") || "Diagram";
    const subtitle = params.get("subtitle") || "Structured project diagram";

    document.getElementById("main-title").textContent = title;
    document.getElementById("main-subtitle").textContent = subtitle;
    document.getElementById("diagram-title").textContent = title;
    document.getElementById("diagram-subtitle").textContent = subtitle;
    document.getElementById("diagram-image").src = image;
  </script>
</body>
</html>
