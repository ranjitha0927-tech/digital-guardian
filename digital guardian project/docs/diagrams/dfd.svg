<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1100" viewBox="0 0 1800 1100">
  <defs>
    <style>
      .bg { fill: #f9fbf6; }
      .title { font: 700 30px Arial, sans-serif; fill: #21422d; }
      .sub { font: 400 15px Arial, sans-serif; fill: #557260; }
      .entity { fill: #ffffff; stroke: #7ca287; stroke-width: 2.5; rx: 16; ry: 16; }
      .process { fill: #dff2e4; stroke: #4d7a5b; stroke-width: 2.5; rx: 24; ry: 24; }
      .store { fill: #fffdf2; stroke: #b6953f; stroke-width: 2.5; rx: 12; ry: 12; }
      .label { font: 700 20px Arial, sans-serif; fill: #21422d; }
      .text { font: 14px Arial, sans-serif; fill: #2f4937; }
      .flow { stroke: #4d7a5b; stroke-width: 2.6; fill: none; marker-end: url(#arrow); }
      .flow2 { stroke: #8e7330; stroke-width: 2.4; fill: none; marker-end: url(#arrow2); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#4d7a5b"/>
    </marker>
    <marker id="arrow2" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#8e7330"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="1100"/>
  <text x="54" y="54" class="title">Digital Guardian Data Flow Diagram</text>
  <text x="54" y="80" class="sub">Actors, backend processes, storage, and notification flow based on the Flask API and monitoring service</text>

  <rect class="entity" x="70" y="170" width="230" height="110"/>
  <text class="label" x="130" y="215">Parent User</text>
  <text class="text" x="94" y="246">Registers, logs in, views alerts,</text>
  <text class="text" x="94" y="268">history, reports, and settings</text>

  <rect class="entity" x="70" y="410" width="230" height="110"/>
  <text class="label" x="144" y="455">Child User</text>
  <text class="text" x="94" y="486">Logs in, triggers search and</text>
  <text class="text" x="94" y="508">activity monitoring events</text>

  <rect class="entity" x="70" y="650" width="230" height="110"/>
  <text class="label" x="128" y="695">Admin User</text>
  <text class="text" x="94" y="726">Uses admin panel for CRUD,</text>
  <text class="text" x="94" y="748">oversight, and audit review</text>

  <rect class="process" x="430" y="130" width="280" height="120"/>
  <text class="label" x="480" y="180">1. Auth Process</text>
  <text class="text" x="460" y="212">Parent registration/login</text>
  <text class="text" x="460" y="234">Child login with JWT token</text>

  <rect class="process" x="430" y="330" width="280" height="120"/>
  <text class="label" x="444" y="380">2. Child Management</text>
  <text class="text" x="460" y="412">Create and list child profiles</text>
  <text class="text" x="460" y="434">Seed starter monitoring records</text>

  <rect class="process" x="430" y="530" width="280" height="120"/>
  <text class="label" x="438" y="580">3. Monitoring Engine</text>
  <text class="text" x="460" y="612">Analyze searches and activities</text>
  <text class="text" x="460" y="634">Classify restricted behavior</text>

  <rect class="process" x="430" y="730" width="280" height="120"/>
  <text class="label" x="452" y="780">4. Reports/Settings</text>
  <text class="text" x="460" y="812">Recalculate summaries</text>
  <text class="text" x="460" y="834">Read and update preferences</text>

  <rect class="process" x="820" y="320" width="320" height="160"/>
  <text class="label" x="860" y="374">5. Notification Service</text>
  <text class="text" x="850" y="408">Create alert and notification logs</text>
  <text class="text" x="850" y="430">Dispatch Twilio/Fast2SMS/Textlocal</text>
  <text class="text" x="850" y="452">or simulated demo SMS delivery</text>

  <rect class="store" x="1280" y="110" width="360" height="150"/>
  <text class="label" x="1374" y="166">D1. User/Profile Data</text>
  <text class="text" x="1310" y="198">admin_users, parent_users,</text>
  <text class="text" x="1310" y="220">child_profiles, settings,</text>
  <text class="text" x="1310" y="242">admin_panel_settings, audit logs</text>

  <rect class="store" x="1280" y="340" width="360" height="170"/>
  <text class="label" x="1342" y="396">D2. Monitoring Data</text>
  <text class="text" x="1310" y="428">restricted_keywords, browsing_history,</text>
  <text class="text" x="1310" y="450">activity_logs, safe_search_results,</text>
  <text class="text" x="1310" y="472">alerts, notifications</text>

  <rect class="store" x="1280" y="600" width="360" height="130"/>
  <text class="label" x="1398" y="652">D3. Reports</text>
  <text class="text" x="1310" y="684">reports summary_json, screen time,</text>
  <text class="text" x="1310" y="706">restricted counts, safety score</text>

  <rect class="entity" x="1280" y="820" width="360" height="110"/>
  <text class="label" x="1388" y="865">SMS Provider</text>
  <text class="text" x="1320" y="896">External gateway or demo-mode</text>
  <text class="text" x="1320" y="918">simulated delivery</text>

  <path class="flow" d="M300 220 C360 220, 380 190, 430 190"/>
  <text class="text" x="314" y="190">register/login request</text>

  <path class="flow" d="M300 460 C372 460, 388 404, 430 404"/>
  <text class="text" x="308" y="428">child account actions</text>

  <path class="flow" d="M300 460 C370 460, 390 592, 430 592"/>
  <text class="text" x="324" y="566">search/activity events</text>

  <path class="flow" d="M300 220 C356 220, 386 780, 430 780"/>
  <text class="text" x="310" y="616">dashboard/settings/report requests</text>

  <path class="flow" d="M300 700 C360 700, 388 392, 430 392"/>
  <text class="text" x="314" y="680">admin CRUD oversight</text>

  <path class="flow2" d="M710 190 C930 190, 1050 185, 1280 185"/>
  <text class="text" x="886" y="170">store and validate account data</text>

  <path class="flow2" d="M710 390 C940 390, 1070 185, 1280 185"/>
  <text class="text" x="870" y="286">read/write children and settings</text>

  <path class="flow2" d="M710 590 C930 590, 1040 425, 1280 425"/>
  <text class="text" x="876" y="540">history/activity/keyword processing</text>

  <path class="flow" d="M710 590 C780 590, 794 400, 820 400"/>
  <text class="text" x="740" y="452">restricted event</text>

  <path class="flow2" d="M710 790 C960 790, 1100 660, 1280 660"/>
  <text class="text" x="878" y="760">update report summaries</text>

  <path class="flow2" d="M1140 400 C1200 400, 1220 425, 1280 425"/>
  <text class="text" x="1160" y="382">save alerts/notifications</text>

  <path class="flow" d="M1140 432 C1210 432, 1220 875, 1280 875"/>
  <text class="text" x="1162" y="812">send SMS or simulated message</text>

  <path class="flow" d="M1280 875 C1110 875, 970 470, 300 220"/>
  <text class="text" x="754" y="916">alerts and notifications reach parent</text>

  <path class="flow" d="M1280 660 C970 660, 900 790, 710 790"/>
  <text class="text" x="930" y="690">summary for dashboard/report API</text>

  <path class="flow" d="M1280 425 C980 425, 870 590, 710 590"/>
  <text class="text" x="946" y="448">monitoring history and safe results</text>
</svg>
