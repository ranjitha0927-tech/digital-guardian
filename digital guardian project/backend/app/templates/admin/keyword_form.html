{% extends "admin/base.html" %}
{% block page_title %}{{ 'Edit Restricted Keyword' if keyword else 'Add Restricted Keyword' }}{% endblock %}
{% block page_subtitle %}Maintain realistic keyword filtering for unsafe search detection.{% endblock %}
{% block content %}
<div class="panel-card form-card">
  <form method="post" class="row g-4">
    <div class="col-md-6"><label class="form-label">Keyword</label><input class="form-control" name="keyword" value="{{ keyword.keyword if keyword else '' }}" required></div>
    <div class="col-md-6"><label class="form-label">Category</label><input class="form-control" name="category" value="{{ keyword.category if keyword else '' }}" required></div>
    <div class="col-md-6">
      <label class="form-label">Severity</label>
      <select class="form-select" name="severity">
        {% for value in ['medium', 'high', 'critical'] %}
        <option value="{{ value }}" {% if keyword and keyword.severity == value %}selected{% endif %}>{{ value|title }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-md-6 d-flex align-items-center">
      <div class="form-check form-switch mt-4">
        <input class="form-check-input" type="checkbox" name="active" {% if not keyword or keyword.active %}checked{% endif %}>
        <label class="form-check-label">Active keyword</label>
      </div>
    </div>
    <div class="col-12">
      <button class="btn btn-primary rounded-pill px-4">Save Keyword</button>
      <a class="btn btn-outline-secondary rounded-pill px-4" href="{{ url_for('admin.keywords') }}">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
